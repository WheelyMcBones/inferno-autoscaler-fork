apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-adapter-monitoring
  labels:
    app.kubernetes.io/name: workload-variant-autoscaler
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: prometheus-adapter
    namespace: {{ .Values.wva.prometheus.monitoringNamespace | default "openshift-user-workload-monitoring" }}
---
# Additional binding for thanos-querier access (OpenShift specific)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-adapter-thanos-querier
  labels:
    app.kubernetes.io/name: workload-variant-autoscaler
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:monitoring
subjects:
  - kind: ServiceAccount
    name: prometheus-adapter
    namespace: {{ .Values.wva.prometheus.monitoringNamespace | default "openshift-user-workload-monitoring" }}
